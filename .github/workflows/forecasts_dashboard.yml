on:
  workflow_dispatch:
  schedule:
  - cron: "0 13 * * *"

name: forecasts_dashboard

jobs:
  flare_glm_v4:
    runs-on: ubuntu-latest
    env:
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    container:
      image: rqthomas/flare-rocker:4.0.4
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: install deps
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        shell: Rscript {0}
        run: |
          install.packages('rLakeAnalyzer')
          remotes::install_github("flare-forecast/ropenmeteo")
          GLMAEDr::glm_install()
          install.packages('pracma')
          remotes::install_github("GLEON/glmtools")

      - name: Run automatic prediction file
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run:  Rscript $GITHUB_WORKSPACE/workflows/glm_flare_v4/forecast_workflow.R

      - name: Run automatic prediction file
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run:  Rscript $GITHUB_WORKSPACE/workflows/glm_flare_v4/forecast_workflow_ecmwf_ifs025.R

  build-dashboard:
    needs: flare_glm_v4
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
    container: rqthomas/flare-rocker:4.0.4
    steps:
      - run: git config --system --add safe.directory '*'

      - uses: actions/checkout@v5
        with:
           fetch-depth: 0
           set-safe-directory: '*'

      - name: install deps
        env:
           GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        shell: Rscript {0}
        run: source("dashboard/install.R")

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.6.42

      - name: Render
        run: |
          quarto render dashboard

      - name: Publish
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout gh-pages
          cp -r dashboard/docs/* .
          git add .
          git commit -a -m "update pages" || echo "nothing to commit"
          git push https://${GITHUB_PAT}:${GITHUB_PAT}@github.com/${GITHUB_REPOSITORY}

